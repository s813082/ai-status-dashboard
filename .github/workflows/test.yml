name: test

on:
  push:
  pull_request:

jobs:
  node-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # 專案零第三方依賴、無 lockfile，故不需 npm ci
      - name: Run tests
        run: node --test test/*.test.js
